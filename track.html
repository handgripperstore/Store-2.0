<!DOCTYPE html>
<html>

<head>

<title>Track Order</title>

<style>

body{
background:#0d0d0d;
color:white;
font-family:Poppins;
text-align:center;
padding:80px;
}

input{
padding:12px;
border-radius:6px;
border:none;
width:200px;
}

button{
padding:12px 20px;
border:none;
border-radius:30px;
background:#d4af37;
color:black;
font-weight:600;
cursor:pointer;
margin-left:10px;
}

.result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h2>Track Your Order</h2>

<input id="order_code" placeholder="Enter Order Code">

<button onclick="track()">Track</button>

<div class="result" id="result"></div>

<script>

const saved=localStorage.getItem("order_code")

if(saved){
document.getElementById("order_code").value=saved
}

async function track(){

const code=document.getElementById("order_code").value

const res=await fetch("/api/checkStatus?order_code="+code)

const data=await res.json()

let msg=""

if(data.status==="approved"){
msg="Your order is confirmed."
}
else if(data.status==="pending"){
msg="Payment verification is still in progress."
}
else if(data.status==="rejected"){
msg="Payment not detected."
}
else{
msg="Order not found."
}

document.getElementById("result").innerText=msg

}

</script>

</body>
</html>
