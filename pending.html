<!DOCTYPE html>
<html>

<head>

<title>Verifying Payment</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:60px;
background:#f5f5f5;
}

.container{
background:white;
padding:40px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.loader{
margin:30px auto;
border:6px solid #eee;
border-top:6px solid #7b2cff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>

</head>

<body>

<div class="container">

<h2>Verifying Your Payment</h2>

<p>Please wait while we confirm your payment.</p>

<p>This usually takes less than one minute.</p>

<div class="loader"></div>

<p>Do not close this page.</p>

</div>

<script>

const order_code=localStorage.getItem("order_code")

async function checkStatus(){

const res=await fetch("/api/checkStatus?order_code="+order_code)

const data=await res.json()

if(data.status==="approved"){
window.location.href="/success.html"
}

if(data.status==="rejected"){
window.location.href="/payment-failed.html"
}

}

setInterval(checkStatus,4000)

</script>

</body>

</html>
