<!DOCTYPE html>
<html>

<head>

<title>Order Details</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:60px;
}

.container{
background:white;
padding:40px;
max-width:600px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
margin-bottom:30px;
}

.row{
display:flex;
justify-content:space-between;
margin:10px 0;
font-size:18px;
}

.total{
font-weight:bold;
font-size:20px;
margin-top:20px;
}

button{
margin-top:25px;
padding:12px 20px;
background:#7b2cff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#5f21cc;
}

</style>

</head>

<body>

<div class="container">

<h2>Order Summary</h2>

<div class="row">
<span>Product</span>
<span>Premium Item</span>
</div>

<div class="row">
<span>Price</span>
<span>₹10</span>
</div>

<div class="row">
<span>Shipping</span>
<span>Free</span>
</div>

<div class="row total">
<span>Total Paid</span>
<span>₹10</span>
</div>

<hr>

<p>Order Code</p>

<h3 id="order_code"></h3>

<button onclick="track()">Track Order</button>

<button onclick="home()">Return to Home</button>

</div>

<script>

const order_code = localStorage.getItem("order_code")

document.getElementById("order_code").innerText = order_code

function track(){
window.location.href="/track.html"
}

function home(){
window.location.href="/"
}

</script>

</body>

</html>
