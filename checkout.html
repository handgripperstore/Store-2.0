<!DOCTYPE html>
<html>
<head>
  <title>Pay with UPI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      width: 350px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      text-align: center;
    }

    .slider {
      margin-top: 30px;
      background: #ede9fe;
      border-radius: 50px;
      padding: 6px;
      position: relative;
      cursor: pointer;
    }

    .slider-text {
      text-align: center;
      font-weight: 600;
      color: #6d28d9;
      padding: 10px 0;
    }

    .thumb {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #6d28d9, #9333ea);
      border-radius: 50%;
      position: absolute;
      left: 6px;
      top: 6px;
      transition: 0.3s;
    }

  </style>
</head>
<body>

<div class="card">
  <h2>Complete Payment</h2>
  <p>Amount: ₹10</p>

  <div class="slider" onclick="pay()">
    <div class="slider-text">Slide to Pay with UPI</div>
    <div class="thumb"></div>
  </div>
</div>

<script>
function pay() {
  window.location.href = "upi://pay?pa=9177916932@fam&pn=MiniStore&am=10&cu=INR";
}
</script>

</body>
</html>
