<!DOCTYPE html>
<html>
<head>
  <title>Sumith E-com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="icon" href="logo.jpg">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
    }

    .main-header {
      background: white;
      padding: 18px 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      text-align: center;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    .logo {
      height: 45px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: #111827;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .card {
      background: white;
      width: 380px;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.08);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .amount {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .qr {
      margin: 20px 0;
      animation: pop 0.5s ease;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6d28d9, #9333ea);
      color: white;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    @keyframes pop {
      from {transform: scale(0.8);}
      to {transform: scale(1);}
    }
  </style>
</head>
<body>

<header class="main-header">
  <div class="brand">
    <img src="logo.jpg" class="logo">
    <span class="brand-name">Sumith E-com</span>
  </div>
</header>

<div class="wrapper">
  <div class="card">
    <h2>Scan & Pay</h2>
    <div class="amount">Amount: ₹10</div>

    <div class="qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=upi://pay?pa=9177916932@fam&pn=SumithEcom&am=10&cu=INR">
    </div>

    <p>Scan using PhonePe / GPay / Any UPI App</p>

    <button onclick="confirmPayment()">I Have Paid</button>
  </div>
</div>

<script>
function confirmPayment() {
  window.location.href = "success.html";
}
</script>

</body>
</html>
